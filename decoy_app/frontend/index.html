<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureCorp Enterprise Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="brand">SecureCorp</div>
    <div class="tag">Enterprise Operations Portal</div>
  </header>

  <main class="layout">
    <section class="panel">
      <h1>Employee & System Access</h1>
      <p class="subtitle">Decoy environment for controlled security testing.</p>

      <label for="username">User Lookup</label>
      <div class="controls">
        <input id="username" placeholder="e.g. admin" autocomplete="off">
        <button id="lookupBtn">Fetch User</button>
      </div>

      <div class="controls stacked">
        <button id="adminBtn" class="danger">Open Admin Panel</button>
        <button id="metricsBtn" class="secondary">View Metrics</button>
      </div>
    </section>

    <section class="panel viewer">
      <h2>Response Viewer</h2>
      <p class="subtitle">Live API response output for demos.</p>
      <pre id="output">Ready. Run an action to inspect backend responses.</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
